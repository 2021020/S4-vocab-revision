<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Masterclass — Interactive Presentation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #222240;
  --text: #e8e8f0;
  --text-dim: #9999bb;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --green: #00c9a7;
  --blue: #4fc3f7;
  --orange: #ffb74d;
  --purple: #b388ff;
  --pink: #f48fb1;
  --teal: #80cbc4;
  --red: #ef5350;
  --gold: #ffd54f;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative;
}

/* Progress Bar */
#progress-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 4px; background: var(--surface2);
  z-index: 100;
}
#progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width var(--transition);
  border-radius: 0 2px 2px 0;
}

/* Top Bar */
#top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 50;
  flex-shrink: 0;
}
#top-bar .unit-badge {
  font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 1px;
}
#top-bar .slide-counter {
  font-size: 13px; color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}
#top-bar .menu-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 20px; padding: 4px 8px;
  border-radius: 8px; transition: all 0.2s;
}
#top-bar .menu-btn:hover { background: var(--surface2); color: var(--text); }

/* Slide Container */
#slide-container {
  flex: 1; overflow: hidden; position: relative;
}
.slide {
  position: absolute; inset: 0;
  padding: 40px 48px;
  overflow-y: auto;
  opacity: 0; transform: translateX(60px);
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  scrollbar-width: thin;
  scrollbar-color: var(--surface2) transparent;
}
.slide::-webkit-scrollbar { width: 6px; }
.slide::-webkit-scrollbar-track { background: transparent; }
.slide::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
.slide.active {
  opacity: 1; transform: translateX(0);
  pointer-events: all;
}
.slide.exit-left {
  opacity: 0; transform: translateX(-60px);
}

/* Navigation */
#nav {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; padding: 16px 24px;
  background: var(--surface);
  border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; z-index: 50;
}
.nav-btn {
  background: var(--surface2); border: none;
  color: var(--text); width: 44px; height: 44px;
  border-radius: 12px; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.nav-btn:hover { background: var(--accent); transform: scale(1.05); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.nav-btn:disabled:hover { background: var(--surface2); }
#nav-dots {
  display: flex; gap: 6px; align-items: center;
}
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--surface2); cursor: pointer;
  transition: all 0.3s; border: none;
}
.nav-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
.nav-dot:hover { background: var(--text-dim); }

/* ===== SLIDE STYLES ===== */

/* Title Slide */
.title-slide {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  background: radial-gradient(ellipse at 50% 30%, rgba(108,99,255,0.15), transparent 70%);
}
.title-slide h1 {
  font-family: 'Playfair Display', serif;
  font-size: 56px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 16px;
  line-height: 1.2;
}
.title-slide .subtitle {
  font-size: 20px; color: var(--text-dim);
  max-width: 600px; line-height: 1.6;
  margin-bottom: 40px;
}
.title-slide .meta {
  display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
}
.title-slide .meta-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; background: var(--surface2);
  border-radius: 24px; font-size: 13px; color: var(--text-dim);
}
.title-slide .start-btn {
  margin-top: 40px; padding: 14px 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 30px; color: white;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.3s; box-shadow: 0 4px 20px rgba(108,99,255,0.4);
}
.title-slide .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,99,255,0.5); }

/* TOC Slide */
.toc-slide h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px; margin-bottom: 32px;
  color: var(--text);
}
.toc-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.toc-card {
  padding: 20px 24px; background: var(--surface2);
  border-radius: var(--radius); cursor: pointer;
  transition: all 0.3s; border: 1px solid transparent;
  position: relative; overflow: hidden;
}
.toc-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 4px; height: 100%; border-radius: 4px 0 0 4px;
}
.toc-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.1); box-shadow: var(--shadow); }
.toc-card .toc-num {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 8px; opacity: 0.7;
}
.toc-card .toc-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.toc-card .toc-count { font-size: 12px; color: var(--text-dim); }

/* Unit Intro Slide */
.unit-intro {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
}
.unit-intro .unit-icon { font-size: 72px; margin-bottom: 24px; }
.unit-intro h2 {
  font-family: 'Playfair Display', serif;
  font-size: 42px; margin-bottom: 12px;
}
.unit-intro .unit-desc {
  font-size: 18px; color: var(--text-dim);
  max-width: 600px; line-height: 1.6; margin-bottom: 32px;
}
.unit-intro .word-preview {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; max-width: 700px;
}
.unit-intro .word-chip {
  padding: 6px 14px; background: var(--surface2);
  border-radius: 20px; font-size: 13px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.2s;
}
.unit-intro .word-chip:hover { border-color: var(--accent); }

/* Word Slide */
.word-slide { max-width: 900px; margin: 0 auto; }
.word-header {
  display: flex; align-items: flex-start; gap: 24px;
  margin-bottom: 32px;
}
.word-main { flex: 1; }
.word-title {
  font-size: 42px; font-weight: 800;
  margin-bottom: 8px; line-height: 1.2;
  display: flex; align-items: center; gap: 12px;
}
.pronounce-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(108,99,255,0.15); border: 2px solid rgba(108,99,255,0.3);
  color: var(--accent); font-size: 18px; cursor: pointer;
  transition: all 0.25s; flex-shrink: 0;
}
.pronounce-btn:hover { background: rgba(108,99,255,0.3); transform: scale(1.1); }
.pronounce-btn:active { transform: scale(0.95); }
.pronounce-btn.speaking {
  background: rgba(108,99,255,0.4); border-color: var(--accent);
  animation: pulse-ring 1s ease infinite;
}
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(108,99,255,0.4); }
  70% { box-shadow: 0 0 0 10px rgba(108,99,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(108,99,255,0); }
}
.pronounce-btn-sm {
  width: 28px; height: 28px; font-size: 13px;
  border-radius: 50%; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); color: var(--text-dim);
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
}
.pronounce-btn-sm:hover { background: rgba(108,99,255,0.2); color: var(--accent); border-color: var(--accent); }
.pronounce-btn-sm.speaking { background: rgba(108,99,255,0.3); color: var(--accent); animation: pulse-ring 1s ease infinite; }
.word-phonetic {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; color: var(--text-dim);
  margin-bottom: 16px;
}
.syllable-display {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.syllable {
  padding: 6px 14px; border-radius: 10px;
  font-size: 22px; font-weight: 600;
  transition: all 0.3s;
}
.syllable.stressed {
  text-decoration: underline;
  text-decoration-thickness: 3px;
  text-underline-offset: 4px;
  font-weight: 800;
}
.word-pos {
  display: inline-block; padding: 3px 10px;
  border-radius: 6px; font-size: 12px;
  font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 12px;
}
.word-definition {
  font-size: 18px; line-height: 1.7;
  color: var(--text); margin-bottom: 8px;
}
.word-simple {
  font-size: 15px; color: var(--text-dim);
  font-style: italic; line-height: 1.6;
  padding-left: 16px;
  border-left: 3px solid var(--accent);
}

/* Word Illustration */
.word-illustration {
  width: 160px; height: 160px;
  border-radius: 20px; display: flex;
  align-items: center; justify-content: center;
  font-size: 64px; flex-shrink: 0;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: var(--shadow);
}

/* Section Cards */
.section-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 24px; margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.04);
}
.section-card h3 {
  font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 16px; display: flex;
  align-items: center; gap: 8px;
}
.section-card h3 .icon { font-size: 18px; }

/* Collocations */
.collocation-list { display: flex; flex-direction: column; gap: 8px; }
.collocation-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; background: rgba(255,255,255,0.03);
  border-radius: 10px; font-size: 15px;
}
.collocation-item .bullet {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.collocation-item .highlight { font-weight: 600; }

/* Examples */
.example-list { display: flex; flex-direction: column; gap: 12px; }
.example-item {
  padding: 14px 18px; background: rgba(255,255,255,0.03);
  border-radius: 12px; font-size: 15px;
  line-height: 1.6; border-left: 3px solid;
}
.example-item .num {
  font-weight: 700; font-size: 12px;
  margin-right: 8px; opacity: 0.5;
}

/* Food for Thought */
.food-for-thought {
  background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(255,101,132,0.1));
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: var(--radius);
  padding: 24px; margin-top: 8px;
}
.food-for-thought h3 { color: var(--accent); }
.food-for-thought p {
  font-size: 16px; line-height: 1.7;
  font-style: italic;
}

/* Summary Slide */
.summary-slide h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px; margin-bottom: 24px;
}
.mindmap-container {
  display: flex; flex-direction: column;
  align-items: center; gap: 16px;
}
.mindmap-center {
  padding: 16px 32px; border-radius: 16px;
  font-size: 20px; font-weight: 700;
  text-align: center;
}
.mindmap-branches {
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center; max-width: 800px;
}
.mindmap-branch {
  padding: 8px 16px; border-radius: 12px;
  font-size: 14px; font-weight: 500;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.2s; cursor: default;
}
.mindmap-branch:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

/* Expression Slide */
.expr-slide { max-width: 900px; margin: 0 auto; }
.expr-header {
  margin-bottom: 28px;
}
.expr-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px; margin-bottom: 8px;
}
.expr-header .expr-desc {
  font-size: 16px; color: var(--text-dim);
  line-height: 1.6;
}
.expr-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}
.expr-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 20px; border: 1px solid rgba(255,255,255,0.04);
  transition: all 0.3s;
}
.expr-card:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-2px); }
.expr-card .expr-phrase {
  font-size: 16px; font-weight: 700;
  margin-bottom: 8px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.expr-card .expr-example {
  font-size: 14px; color: var(--text-dim);
  line-height: 1.6; font-style: italic;
}
.expr-card .expr-note {
  font-size: 12px; color: var(--accent);
  margin-top: 8px; font-weight: 500;
}

/* Quiz Slide */
.quiz-slide { max-width: 900px; margin: 0 auto; }
.quiz-slide h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px; margin-bottom: 8px;
}
.quiz-slide .quiz-subtitle {
  font-size: 15px; color: var(--text-dim);
  margin-bottom: 28px;
}
.quiz-question {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 24px; margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,0.04);
}
.quiz-question .q-num {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px; opacity: 0.5;
}
.quiz-question .q-text {
  font-size: 17px; font-weight: 600;
  margin-bottom: 16px; line-height: 1.5;
}
.quiz-question .q-blank {
  display: inline-block; min-width: 120px;
  border-bottom: 2px dashed var(--accent);
  padding: 2px 8px; margin: 0 4px;
  font-weight: 700; color: var(--accent);
}
.quiz-options {
  display: flex; flex-direction: column; gap: 8px;
}
.quiz-option {
  padding: 12px 16px; background: rgba(255,255,255,0.03);
  border-radius: 10px; cursor: pointer;
  font-size: 15px; transition: all 0.2s;
  border: 2px solid transparent;
  display: flex; align-items: center; gap: 10px;
}
.quiz-option:hover { background: rgba(255,255,255,0.06); }
.quiz-option .opt-letter {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  background: var(--surface); flex-shrink: 0;
}
.quiz-option.selected { border-color: var(--accent); background: rgba(108,99,255,0.1); }
.quiz-option.correct { border-color: var(--green); background: rgba(0,201,167,0.1); }
.quiz-option.wrong { border-color: var(--red); background: rgba(239,83,80,0.1); }
.quiz-option.correct .opt-letter { background: var(--green); color: #000; }
.quiz-option.wrong .opt-letter { background: var(--red); color: #fff; }

.quiz-fill {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.quiz-fill input {
  flex: 1; padding: 10px 14px;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: var(--text);
  font-size: 15px; font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}
.quiz-fill input:focus {
  outline: none; border-color: var(--accent);
  background: rgba(108,99,255,0.05);
}
.quiz-fill input.correct { border-color: var(--green); background: rgba(0,201,167,0.05); }
.quiz-fill input.wrong { border-color: var(--red); background: rgba(239,83,80,0.05); }
.quiz-fill .check-btn {
  padding: 10px 16px; background: var(--accent);
  border: none; border-radius: 10px; color: white;
  font-weight: 600; cursor: pointer; font-size: 13px;
  transition: all 0.2s; white-space: nowrap;
}
.quiz-fill .check-btn:hover { opacity: 0.9; }
.word-bank {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 14px 16px; margin-bottom: 18px;
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 12px;
}
.word-bank-label {
  width: 100%; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-dim); margin-bottom: 4px;
}
.word-chip {
  padding: 6px 14px; border-radius: 20px;
  background: rgba(108,99,255,0.12); color: var(--accent);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1px solid rgba(108,99,255,0.25);
  transition: all 0.2s; user-select: none;
}
.word-chip:hover { background: rgba(108,99,255,0.25); transform: translateY(-1px); }
.word-chip.used { opacity: 0.35; pointer-events: none; text-decoration: line-through; }

.quiz-submit {
  display: block; margin: 24px auto 0;
  padding: 14px 40px; background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 30px; color: white;
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: all 0.3s;
}
.quiz-submit:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(108,99,255,0.4); }

.quiz-result {
  text-align: center; padding: 32px;
  background: var(--surface2); border-radius: var(--radius);
  margin-top: 24px; display: none;
}
.quiz-result.show { display: block; }
.quiz-result .score {
  font-size: 48px; font-weight: 800;
  background: linear-gradient(135deg, var(--green), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.quiz-result .score-label {
  font-size: 16px; color: var(--text-dim); margin-top: 8px;
}
.quiz-result .score-msg {
  font-size: 18px; margin-top: 16px; font-weight: 500;
}

/* Matching Exercise */
.matching-container {
  display: flex; gap: 24px; justify-content: center;
  flex-wrap: wrap;
}
.matching-col {
  display: flex; flex-direction: column; gap: 8px;
  min-width: 200px;
}
.matching-item {
  padding: 12px 16px; background: var(--surface2);
  border-radius: 10px; cursor: pointer;
  font-size: 14px; transition: all 0.2s;
  border: 2px solid transparent;
  text-align: center;
}
.matching-item:hover { border-color: var(--accent); }
.matching-item.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); }
.matching-item.matched { border-color: var(--green); background: rgba(0,201,167,0.1); opacity: 0.7; pointer-events: none; }
.matching-item.wrong-match { border-color: var(--red); background: rgba(239,83,80,0.1); }

/* Two Column Layout for Adv/Disadv */
.two-col {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.col-header {
  padding: 12px 20px; border-radius: 12px 12px 0 0;
  font-weight: 700; font-size: 15px; text-align: center;
}
.col-body {
  background: var(--surface2);
  border-radius: 0 0 12px 12px;
  padding: 16px;
}
.col-item {
  padding: 10px 14px; margin-bottom: 8px;
  border-radius: 8px; font-size: 14px;
  line-height: 1.5;
  background: rgba(255,255,255,0.03);
}
.col-item:last-child { margin-bottom: 0; }

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.animate-in > * {
  animation: fadeInUp 0.5s ease both;
}
.animate-in > *:nth-child(1) { animation-delay: 0.05s; }
.animate-in > *:nth-child(2) { animation-delay: 0.1s; }
.animate-in > *:nth-child(3) { animation-delay: 0.15s; }
.animate-in > *:nth-child(4) { animation-delay: 0.2s; }

function getUnitStartSlide(unitNum) {
  for (let i = 0; i < slides.length; i++) {
    if (slides[i].unit === unitNum) return i;
  }
  return 0;
}

function getUnitWordCount(unitNum) {
  if (unitNum === 10) return UVD10.length;
  if (unitNum === 11) return UVD11.length;
  if (unitNum === 12) return UVD12.additive.length + UVD12.contrastive.length;
  if (unitNum === 13) return UVD13.length;
  if (unitNum === 14) return UVD14.length;
  if (unitNum === 15) return UVD15.advantages.length + UVD15.disadvantages.length;
  if (unitNum === 16) return UVD16.length;
  return 0;
}

function getUnitWords(unitNum) {
  if (unitNum === 10) return UVD10.map(w => w.word);
  if (unitNum === 11) return UVD11.map(w => w.word);
  if (unitNum === 12) return [...UVD12.additive, ...UVD12.contrastive].map(e => e.phrase);
  if (unitNum === 13) return UVD13.map(e => e.phrase);
  if (unitNum === 14) return UVD14.map(e => e.phrase);
  if (unitNum === 15) return [...UVD15.advantages, ...UVD15.disadvantages].map(e => e.phrase);
  if (unitNum === 16) return UVD16.map(e => e.phrase);
  return [];
}

function buildVocabUnit(unitNum, words, icon, title, desc) {

        </div>
      </div>`
  });

  // Word slides
  words.forEach((w, i) => {
    const syllableHTML = w.syllables.map((s, si) => {
      const isStressed = si === w.stressed;
      const colorClass = SYLLABLE_COLORS[si % SYLLABLE_COLORS.length];
      return `<span class="syllable ${colorClass} ${isStressed ? 'stressed' : ''}">${s}</span>`;

      'noun / verb': '#80cbc4', 'noun / adjective': '#ffd54f',
      'verb phrase': '#00c9a7', 'adjective / adverb': '#ffb74d'
    };
    const posColor = posColors[w.pos] || '#999';

    slides.push({
      type: 'word',
      unit: unitNum,
      html: `
        <div class="word-slide animate-in">
          <div class="word-header">
            <div class="word-main">
              <div class="word-title" style="color:${color}">${w.word} <button class="pronounce-btn" onclick="pronounce('${w.word.replace(/'/g, "\\'")}', this)" title="Listen to pronunciation">🔊</button></div>
              <div class="word-phonetic">${w.phonetic}</div>

                const regex = new RegExp('(' + escapeRegex(w.word) + ')', 'gi');
                const rendered = c.replace(regex, '<span class="highlight" style="color:' + color + '">$1</span>');
                return `
                <div class="collocation-item">
                  <span class="bullet" style="background:${color}"></span>
                  <span>${rendered}</span>

function buildVocabQuiz(unitNum, words, color) {
  const theme = UNIT_THEMES[unitNum];
  const quizWords = shuffleArray([...words]).slice(0, Math.min(8, words.length));

  // Fill-in-the-blank
  const fillQuestions = quizWords.slice(0, 4).map(w => {
    const sentence = w.examples[0].replace(/<b>(.*?)<\/b>/g, '________');
    return { word: w.word, sentence };
  });
  const fillWordBank = shuffleArray(fillQuestions.map(q => q.word));

  // Multiple choice
  const mcQuestions = quizWords.slice(4, 8).map(w => {
    const correctDef = w.definition;
    const otherDefs = words.filter(ow => ow.word !== w.word).map(ow => ow.definition);
    const wrongDefs = shuffleArray(otherDefs).slice(0, 3);
    const options = shuffleArray([correctDef, ...wrongDefs]);
    return { word: w.word, correctDef, options };
  });

  const quizId = `quiz-${unitNum}`;

  slides.push({
    type: 'quiz',
    unit: unitNum,
    html: `
      <div class="quiz-slide animate-in">
        <h2 style="color:${color}">🧠 Knowledge Check — Unit ${unitNum}</h2>
        <p class="quiz-subtitle">Test your understanding of the vocabulary from this unit.</p>

        <div style="margin-bottom:24px;">
          <h3 style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;color:${color};">📝 Part A: Fill in the Blanks</h3>
          <div style="background:var(--surface);border-radius:12px;padding:12px 16px;margin-bottom:14px;border-left:4px solid ${color};">
            <p style="font-size:12px;color:var(--text-dim);margin:0;line-height:1.5;">
              <strong style="color:${color};">📌 Instructions:</strong> Read each sentence and fill in the blank with the correct word. Use the <strong style="color:var(--text);">Word Bank</strong> below — click a word to insert it, or type your answer directly.
            </p>
          </div>
          <div class="word-bank" id="${quizId}-wordbank">
            <div class="word-bank-label">💡 Word Bank</div>
            ${fillWordBank.map((w, i) => `<span class="word-chip" onclick="useWordChip(this, '${quizId}-fill-0', '${quizId}-wordbank')">${w}</span>`).join('')}
          </div>
          ${fillQuestions.map((q, i) => `
            <div class="quiz-fill" data-answer="${q.word.toLowerCase()}">
              <span style="font-size:13px;color:var(--text-dim);min-width:24px;">${i + 1}.</span>
              <div style="flex:1;font-size:14px;line-height:1.6;color:var(--text);margin-right:8px;">${q.sentence}</div>
              <input type="text" placeholder="Type here..." id="${quizId}-fill-${i}" autocomplete="off" style="max-width:180px;">
              <button class="check-btn" onclick="checkFill('${quizId}-fill-${i}','${q.word.toLowerCase()}')">✓</button>
            </div>
          `).join('')}
        </div>

        <div>
          <h3 style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;color:${color};">🎯 Part B: Multiple Choice</h3>
          ${mcQuestions.map((q, qi) => `
            <div class="quiz-question">
              <div class="q-num">Question ${qi + 1}</div>
              <div class="q-text">What does <span style="color:${color};font-weight:800;">"${q.word}"</span> mean?</div>
              <div class="quiz-options">
                ${q.options.map((opt, oi) => `
                  <div class="quiz-option" onclick="selectMC(this, '${quizId}-mc-${qi}', ${oi === q.options.indexOf(q.correctDef)})" data-correct="${oi === q.options.indexOf(q.correctDef)}">
                    <span class="opt-letter">${String.fromCharCode(65 + oi)}</span>
                    <span>${opt}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>

        <button class="quiz-submit" onclick="showQuizResult('${quizId}')">Check My Answers →</button>
        <div class="quiz-result" id="${quizId}-result">
          <div class="score" id="${quizId}-score">0/0</div>
          <div class="score-label">Your Score</div>
          <div class="score-msg" id="${quizId}-msg"></div>
        </div>
      </div>`
  });
}

function buildExprQuiz(unitNum, expressions, color) {
  const quizId = `quiz-${unitNum}`;
  const selected = shuffleArray([...expressions]).slice(0, 6);

  // Matching exercise — left: expressions, right: examples with blanks
  const leftItems = selected.map(e => e.phrase);

  // Build right items: replace <b>...</b> tagged content in the example with a blank
  // This is reliable because examples already mark the key expression with <b> tags
  const rightData = selected.map((e, origIdx) => {
    const blanked = e.example.replace(/<b>[\s\S]*?<\/b>/g, '________');
    return { origIdx, blanked };
  });
  const rightShuffled = shuffleArray(rightData);

  // Store the mapping: right shuffled index → original expression index
  // rightShuffled[i].origIdx tells us which left item (same index) it matches
  const rightMapping = rightShuffled.map(r => r.origIdx);

  // Store mapping in global matchState for validation
  matchState[quizId] = { left: null, right: null, pairs: [], mapping: rightMapping };

  slides.push({
    type: 'quiz',
    unit: unitNum,
    html: `
      <div class="quiz-slide animate-in">
        <h2 style="color:${color}">🧠 Knowledge Check — Unit ${unitNum}</h2>
        <p class="quiz-subtitle">Fill in the blanks by matching expressions to their contexts.</p>

        <div style="background:var(--surface);border-radius:12px;padding:14px 20px;margin-bottom:16px;border-left:4px solid ${color};">
          <p style="font-size:13px;color:var(--text-dim);margin:0;line-height:1.6;">
            <strong style="color:${color};">📌 How to play:</strong><br>
            ① Click an <strong style="color:var(--text);">expression</strong> on the left.<br>
            ② Click the <strong style="color:var(--text);">sentence with the blank</strong> on the right where it fits.<br>
            ③ If correct, both items turn <span style="color:var(--green);">green</span>. If wrong, they flash <span style="color:var(--red);">red</span> — try again!<br>
            ④ Match all pairs, then click <strong style="color:var(--text);">Check Matches</strong>.
          </p>
        </div>

        <div class="matching-container" id="${quizId}-match">
          <div class="matching-col">
            <div style="text-align:center;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:${color};margin-bottom:8px;">Expressions</div>
            ${leftItems.map((item, i) => `
              <div class="matching-item" data-match="${quizId}" data-side="left" data-index="${i}" onclick="selectMatch(this)">${item}</div>
            `).join('')}
          </div>
          <div style="display:flex;align-items:center;font-size:24px;color:var(--text-dim);">→</div>
          <div class="matching-col">
            <div style="text-align:center;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:${color};margin-bottom:8px;">Sentences (fill the blank)</div>
            ${rightShuffled.map((item, i) => `
              <div class="matching-item" data-match="${quizId}" data-side="right" data-index="${i}" onclick="selectMatch(this)" style="font-size:12px;line-height:1.4;">${item.blanked}</div>
            `).join('')}
          </div>
        </div>

        <div style="text-align:center;margin-top:16px;">
          <button class="quiz-submit" onclick="checkMatching('${quizId}', ${selected.length})">Check Matches →</button>
        </div>
        <div class="quiz-result" id="${quizId}-result">
          <div class="score" id="${quizId}-score">0/0</div>
          <div class="score-label">Matches Found</div>
          <div class="score-msg" id="${quizId}-msg"></div>
        </div>
      </div>`
  });
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function buildGrandQuiz() {
  const allWords = [...UVD10, ...UVD11];
  const selected = shuffleArray(allWords).slice(0, 10);
  const quizId = 'quiz-grand';

  const fillQuestions = selected.slice(0, 5).map(w => {
    const sentence = w.examples[0].replace(/<b>(.*?)<\/b>/g, '________');
    return { word: w.word, sentence };
  });
  const fillWordBank = shuffleArray(fillQuestions.map(q => q.word));

  const mcQuestions = selected.slice(5, 10).map(w => {
    const correctDef = w.definition;
    const otherDefs = allWords.filter(ow => ow.word !== w.word).map(ow => ow.definition);
    const wrongDefs = shuffleArray(otherDefs).slice(0, 3);
    const options = shuffleArray([correctDef, ...wrongDefs]);
    return { word: w.word, correctDef, options };
  });

  slides.push({
    type: 'quiz',
    unit: 0,
    html: `
      <div class="quiz-slide animate-in">
        <h2 style="background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">🏆 Grand Knowledge Check</h2>
        <p class="quiz-subtitle">A comprehensive quiz covering vocabulary from Units 10 & 11. Good luck!</p>

        <div style="margin-bottom:24px;">
          <h3 style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;color:var(--accent);">📝 Part A: Fill in the Blanks</h3>
          <div style="background:var(--surface);border-radius:12px;padding:12px 16px;margin-bottom:14px;border-left:4px solid var(--accent);">
            <p style="font-size:12px;color:var(--text-dim);margin:0;line-height:1.5;">
              <strong style="color:var(--accent);">📌 Instructions:</strong> Read each sentence and fill in the blank with the correct word. Use the <strong style="color:var(--text);">Word Bank</strong> below — click a word to insert it, or type your answer directly.
            </p>
          </div>
          <div class="word-bank" id="${quizId}-wordbank">
            <div class="word-bank-label">💡 Word Bank</div>
            ${fillWordBank.map((w, i) => `<span class="word-chip" onclick="useWordChip(this, '${quizId}-wordbank')">${w}</span>`).join('')}
          </div>
          ${fillQuestions.map((w, i) => {
            const sentence = w.examples[0].replace(/<b>(.*?)<\/b>/g, '________');
            return `
              <div class="quiz-fill" data-answer="${w.word.toLowerCase()}">
                <span style="font-size:13px;color:var(--text-dim);min-width:24px;">${i + 1}.</span>
                <div style="flex:1;font-size:14px;line-height:1.6;color:var(--text);margin-right:8px;">${sentence}</div>
                <input type="text" placeholder="Type here..." id="${quizId}-fill-${i}" autocomplete="off" style="max-width:180px;">
                <button class="check-btn" onclick="checkFill('${quizId}-fill-${i}','${w.word.toLowerCase()}')">✓</button>
              </div>`;
          }).join('')}
        </div>

        <div>
          <h3 style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;color:var(--accent);">🎯 Part B: Multiple Choice</h3>
          ${mcQuestions.map((q, qi) => `
            <div class="quiz-question">
              <div class="q-num">Question ${qi + 1}</div>
              <div class="q-text">What does <span style="color:var(--accent);font-weight:800;">"${q.word}"</span> mean?</div>
              <div class="quiz-options">
                ${q.options.map((opt, oi) => `
                  <div class="quiz-option" onclick="selectMC(this, '${quizId}-mc-${qi}', ${oi === q.options.indexOf(q.correctDef)})" data-correct="${oi === q.options.indexOf(q.correctDef)}">
                    <span class="opt-letter">${String.fromCharCode(65 + oi)}</span>
                    <span>${opt}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>

        <button class="quiz-submit" onclick="showQuizResult('${quizId}')">Check My Answers →</button>
        <div class="quiz-result" id="${quizId}-result">
          <div class="score" id="${quizId}-score">0/0</div>
          <div class="score-label">Your Score</div>
          <div class="score-msg" id="${quizId}-msg"></div>
        </div>
      </div>`
  });
}

// ============================================================
// NAVIGATION & INTERACTION
// ============================================================

function renderSlide(index) {
  const container = document.getElementById('slide-container');
  const prev = container.querySelector('.slide.active');

  if (prev) {
    prev.classList.remove('active');
    prev.classList.add('exit-left');
    setTimeout(() => prev.remove(), 500);
  }

  const slide = slides[index];
  const div = document.createElement('div');
  div.className = 'slide';
  div.innerHTML = slide.html;
  container.appendChild(div);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      div.classList.add('active');
    });
  });

  // Update UI
  currentSlide = index;
  updateProgress();
  updateNavDots();
  updateTopBar(slide);

  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === slides.length - 1;
}

function updateProgress() {
  const pct = ((currentSlide + 1) / slides.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('slide-counter').textContent = `${currentSlide + 1} / ${slides.length}`;
}

function updateTopBar(slide) {
  const badge = document.getElementById('unit-badge');
  if (slide.unit && UNIT_THEMES[slide.unit]) {
    const u = UNIT_THEMES[slide.unit];
    badge.textContent = `${u.icon} Unit ${slide.unit}: ${u.name}`;
    badge.style.background = u.color + '22';
    badge.style.color = u.color;
  } else {
    badge.textContent = 'Vocabulary Masterclass';
    badge.style.background = 'var(--surface2)';
    badge.style.color = 'var(--text-dim)';
  }
}

function updateNavDots() {
  const dotsContainer = document.getElementById('nav-dots');
  dotsContainer.innerHTML = '';

  // Show dots for current unit section
  const unitSlides = slides.map((s, i) => ({ ...s, index: i }));
  const maxDots = 30;
  const step = Math.max(1, Math.floor(slides.length / maxDots));

  for (let i = 0; i < slides.length; i += step) {
    const dot = document.createElement('button');
    dot.className = 'nav-dot' + (i === currentSlide ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dot.title = `Slide ${i + 1}`;
    dotsContainer.appendChild(dot);
  }
}

function nextSlide() {
  if (currentSlide < slides.length - 1) renderSlide(currentSlide + 1);
}

function prevSlide() {
  if (currentSlide > 0) renderSlide(currentSlide - 1);
}

function goToSlide(index) {
  if (index >= 0 && index < slides.length) renderSlide(index);
}

function goToUnitSlide(unitNum) {
  const idx = getUnitStartSlide(unitNum);
  if (idx > 0) goToSlide(idx);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Home') { e.preventDefault(); goToSlide(0); }
  if (e.key === 'End') { e.preventDefault(); goToSlide(slides.length - 1); }
});

// Touch/swipe support
let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', (e) => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) {
    if (diff > 0) nextSlide();
    else prevSlide();
  }
});

// ============================================================
// PRONUNCIATION (Web Speech API)
// ============================================================

function pronounce(text, btn) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.85;
  utterance.pitch = 1;

  // Try to pick a good English voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang === 'en-US' && v.name.includes('Female'))
    || voices.find(v => v.lang === 'en-US' && !v.localService)
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utterance.voice = preferred;

  if (btn) btn.classList.add('speaking');
  utterance.onend = () => { if (btn) btn.classList.remove('speaking'); };
  utterance.onerror = () => { if (btn) btn.classList.remove('speaking'); };

  window.speechSynthesis.speak(utterance);
}

// Pre-load voices (some browsers load them asynchronously)
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ============================================================
// QUIZ INTERACTIONS
// ============================================================

function useWordChip(chip, bankId) {
  const word = chip.textContent;
  const bank = document.getElementById(bankId);
  // Find the first empty, non-disabled input in the same quiz slide
  const slide = bank.closest('.quiz-slide');
  const inputs = slide.querySelectorAll('.quiz-fill input:not(:disabled)');
  if (inputs.length > 0) {
    const target = inputs[0];
    target.value = word;
    target.focus();
    chip.classList.add('used');
  }
}

function checkFill(inputId, answer) {
  const input = document.getElementById(inputId);
  const userAnswer = input.value.trim().toLowerCase();
  if (!userAnswer) return;

  if (userAnswer === answer || userAnswer === answer.replace(/\s+/g, '')) {
    input.classList.remove('wrong');
    input.classList.add('correct');
    input.disabled = true;
  } else {
    input.classList.remove('correct');
    input.classList.add('wrong');
    setTimeout(() => input.classList.remove('wrong'), 1500);
  }
}

function selectMC(el, groupId, isCorrect) {
  const siblings = el.parentElement.querySelectorAll('.quiz-option');
  siblings.forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  el.dataset.selected = 'true';

  // Show immediate feedback
  siblings.forEach(s => {
    if (s.dataset.correct === 'true') s.classList.add('correct');
    else if (s.dataset.selected === 'true' && !isCorrect) s.classList.add('wrong');
  });
}

function showQuizResult(quizId) {
  const result = document.getElementById(`${quizId}-result`);
  const scoreEl = document.getElementById(`${quizId}-score`);
  const msgEl = document.getElementById(`${quizId}-msg`);

  let correct = 0;
  let total = 0;

  // Count fill-in-the-blank
  const fills = document.querySelectorAll(`[id^="${quizId}-fill-"]`);
  fills.forEach(input => {
    total++;
    if (input.classList.contains('correct')) correct++;
  });

  // Count MC
  const mcGroups = new Set();
  document.querySelectorAll(`[id^="${quizId}-mc-"]`).forEach(el => {
    const groupId = el.id.replace(/-\d+$/, '');
    mcGroups.add(groupId);
  });
  mcGroups.forEach(groupId => {
    total++;
    const selected = document.querySelector(`.quiz-option[data-selected="true"][onclick*="${groupId}"]`);
    if (selected && selected.dataset.correct === 'true') correct++;
  });

  scoreEl.textContent = `${correct}/${total}`;
  result.classList.add('show');

  const pct = total > 0 ? (correct / total) * 100 : 0;
  if (pct >= 90) msgEl.textContent = '🌟 Outstanding! You\'ve mastered this unit!';
  else if (pct >= 70) msgEl.textContent = '👏 Great job! Just a few areas to review.';
  else if (pct >= 50) msgEl.textContent = '📚 Good effort! Consider revisiting the vocabulary slides.';
  else msgEl.textContent = '💪 Keep practising! Review the unit and try again.';
}

// Matching exercise
let matchState = { selected: null };

function selectMatch(el) {
  const matchId = el.dataset.match;

  if (!matchState[matchId]) matchState[matchId] = { left: null, right: null, pairs: [], mapping: [] };

  const state = matchState[matchId];
  const side = el.dataset.side;
  const index = parseInt(el.dataset.index);

  if (el.classList.contains('matched')) return;

  // Remove previous selection on same side
  document.querySelectorAll(`.matching-item[data-match="${matchId}"][data-side="${side}"].selected`).forEach(s => s.classList.remove('selected'));

  el.classList.add('selected');

  if (side === 'left') state.left = index;
  else state.right = index;

  // Check if both sides selected
  if (state.left !== null && state.right !== null) {
    const leftEl = document.querySelector(`.matching-item[data-match="${matchId}"][data-side="left"][data-index="${state.left}"]`);
    const rightEl = document.querySelector(`.matching-item[data-match="${matchId}"][data-side="right"][data-index="${state.right}"]`);

    // Use the mapping: mapping[rightIndex] gives the original left index this right item belongs to
    const isCorrect = state.mapping && state.mapping[state.right] === state.left;

    if (isCorrect) {
      leftEl.classList.remove('selected');
      rightEl.classList.remove('selected');
      leftEl.classList.add('matched');
      rightEl.classList.add('matched');
      state.pairs.push(state.left);
    } else {
      leftEl.classList.add('wrong-match');
      rightEl.classList.add('wrong-match');
      setTimeout(() => {
        leftEl.classList.remove('selected', 'wrong-match');
        rightEl.classList.remove('selected', 'wrong-match');
      }, 800);
    }
    state.left = null;
    state.right = null;
  }
}

function checkMatching(quizId, total) {
  const state = matchState[quizId];
  const result = document.getElementById(`${quizId}-result`);
  const scoreEl = document.getElementById(`${quizId}-score`);
  const msgEl = document.getElementById(`${quizId}-msg`);

  const correct = state ? state.pairs.length : 0;
  scoreEl.textContent = `${correct}/${total}`;
  result.classList.add('show');

  const pct = total > 0 ? (correct / total) * 100 : 0;
  if (pct >= 90) msgEl.textContent = '🌟 Outstanding! You\'ve mastered these expressions!';
  else if (pct >= 70) msgEl.textContent = '👏 Great job! Just a few to review.';
  else if (pct >= 50) msgEl.textContent = '📚 Good effort! Try matching them again.';
  else msgEl.textContent = '💪 Keep practising! Review the expressions and try again.';
}

// ============================================================
// UTILITIES
// ============================================================

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// INIT
// ============================================================

buildSlides();
renderSlide(0);
</script>
